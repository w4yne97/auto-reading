obsidian:
  vault_path: ~/auto-reading-vault

sources:
  alphaarxiv:
    enabled: true
    topics: ["coding agent", "code generation", "llm agent"]
  github:
    enabled: true
    topics: ["coding-agent", "ai-coding"]
    tracked_repos:
      - "paul-gauthier/aider"
      - "OpenDevin/OpenDevin"
      - "princeton-nlp/SWE-agent"

categories:
  - coding-agent
  - llm-reasoning
  - code-generation
  - tool-use
  - evaluation
  - infrastructure

claude:
  model: claude-sonnet-4-6
  max_tokens: 4096

fetch:
  default_days: 7
  max_papers_per_run: 50
